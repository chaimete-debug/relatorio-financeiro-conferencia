<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relatório Financeiro</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Segoe UI,Arial,sans-serif;background:linear-gradient(135deg,#163b63,#2a6db1);min-height:100vh;display:flex;align-items:center;justify-content:center}
    .box{background:#fff;border-radius:20px;padding:48px 40px;max-width:420px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.25)}
    .icon{font-size:48px;margin-bottom:20px}
    h1{font-size:22px;color:#163b63;margin-bottom:12px}
    p{font-size:15px;color:#506073;line-height:1.6}
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">🔧</div>
    <h1>Em manutenção</h1>
    <p>O sistema encontra-se temporariamente indisponível para melhorias.<br><br>Voltamos em breve.</p>
  </div>
</body>
</html>
